<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
body{
    margin: 40px;
    background-color: #272a2e;
    color: whitesmoke;
    display: flex;
    justify-content: center;
}

form{
    width: 550px;
    border-color: #4d5154;
    border-style: solid;
    border-width: 1px;
    border-radius: 15px;
    padding: 20px;
}

input{
    width: 100%;
    background-color: #272a2e;
    border-color: #4d5154;
    border-style: solid;
    border-width: 1px;
    border-radius: 10px;
    margin-bottom: 0;
    color: whitesmoke;
}

.form-label{
    margin-bottom: 2px;
}

.mb-3{
    margin-bottom: 8px !important;
    align-items: center;
}

#button{
    width: 30%;
    margin-top: 10px;
    padding: 8px 0;
    border-radius: 10px;
}

</style>
<body>
    <form action="/biblioteca" method="post">
        <h3>Criar Livro</h3>
        <div class="row mb-3">
            <div class="col">
                <div class="mb-3">
                    <label for="titulo" class="form-label">ISBN</label>
                    <input type="text" class="form-control-sm" id="isbn" name="isbn" required>
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <input type="text" class="form-control-sm" id="status" name="status" required>
                </div>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <div class="mb-3">
                    <label for="paginas" class="form-label">Paginas</label>
                    <input type="text" class="form-control-sm" id="paginas" name="paginas" required>
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="ano_publicacao" class="form-label">Ano de Publicação</label>
                    <input type="text" class="form-control-sm" id="ano_publicacao" name="ano_publicacao" required>
                </div>
            </div>
        </div>
        <div class="row mb-3">
            <label for="titulo" class="col-sm-2 col-form-label">Titulo</label>
            <div class="col-sm-10">
                <input type="text" class="form-control-sm" id="titulo" name="titulo" required>
            </div>
        </div>
        <div class="row mb-3">
            <label for="autor" class="col-sm-2 col-form-label">Autor</label>
            <div class="col-sm-10">
                <input type="text" class="form-control-sm" id="autor" name="autor" required>
            </div>
        </div>
        <div class="row mb-3">
            <label for="genero" class="col-sm-2 col-form-label">Genero</label>
            <div class="col-sm-10">
                <input type="text" class="form-control-sm" id="genero" name="genero" required>
            </div>
        </div>
        <div class="row mb-3">
            <label for="editora" class="col-sm-2 col-form-label">Editora</label>
            <div class="col-sm-10">
                <input type="text" class="form-control-sm" id="editora" name="editora" required>
            </div>
        </div>
        <div class="row mb-3">
            <label for="localizacao" class="col-sm-2 col-form-label">Localização</label>
            <div class="col-sm-10">
                <input type="text" class="form-control-sm" id="localizacao" name="localizacao" required>
            </div>
        </div>
        <input type="submit" value="Criar" class="form-control-sm" id="button">
    </form>
</body>
</html>
